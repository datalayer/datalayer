name: jupyterpool
channels:
  - conda-forge
  - defaults
dependencies:
  - jupyter-packaging
  - jupyter-server-proxy
  - nodejs=14.15.1
  - pip
  - pycurl
  - pytest
  - python=3.9
  - twine
  - yarn=1.22.5
  - pip:
    - jupyter_kernel_gateway
    - jupyterlab==3.1.0a3
    - jupyterlab-lsp
    - python-language-server[all]
