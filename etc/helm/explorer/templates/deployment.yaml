apiVersion: extensions/v1beta1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-explorer
  labels:
    app: {{ template "explorer.name" . }}
    chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
spec:
  strategy:
    rollingUpdate:
      maxUnavailable: 0
  replicas: 1
  template:
    metadata:
      labels:
        app: {{ template "explorer.name" . }}
        release: {{ .Release.Name }}
    spec:
      terminationGracePeriodSeconds: 0
#      affinity:
#        nodeAffinity:
#          requiredDuringSchedulingIgnoredDuringExecution:
#            nodeSelectorTerms:
#            - matchExpressions:
#              - key: datalayer-role
#                operator: NotIn
#                values:
#                - master
      containers:
        - name: explorer
          image: {{ .Values.explorer.image }}
          imagePullPolicy: {{ .Values.explorer.imagePullPolicy }}
          env:
          - name: APISERVER_HOST
            value: http://localhost:8001
          - name: DLAHOST
            value: {{ .Values.explorer.env.DLAHOST }}
          - name: DLA_EXPLORER_INDEX_PAGE
            value: {{ .Values.explorer.env.DLA_EXPLORER_INDEX_PAGE }}
          volumeMounts:
          resources:
{{ toYaml .Values.explorer.resources | indent 12 }} 
        - name: explorer-sidecar
          image: datalayer/k8s-sidecar:0.0.3
          imagePullPolicy: IfNotPresent
          args: ["proxy", "-p", "8001"]
