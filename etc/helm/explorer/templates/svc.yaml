apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-explorer-svc
  labels:
    app: {{ template "explorer.name" . }}
    chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
spec:
  type: ClusterIP
  ports:
  - port: {{ .Values.explorer.port }}
    name: explorer-http
  selector:
    app: {{ template "explorer.name" . }}
    release: {{ .Release.Name }}
