apiVersion: networking.k8s.io/v1beta1
kind: Ingress
metadata:
  name: iam-ingress-oidc
  namespace: {{ .Release.Namespace }}
spec:
  rules:
  - host: minikube.datalayer.io.local
    http:
      paths:
      - path: /oidc_callback(/|$)(.*)
        backend:
          serviceName: {{ .Release.Name }}-iam-svc
          servicePort: {{ .Values.iam.port }}
